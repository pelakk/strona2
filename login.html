<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CommiShift</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Konfiguracja Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#0B1220',
                            blue: '#2563EB',
                            purple: '#7C3AED',
                            light: '#F8FAFC',
                            gray: '#64748B',
                            success: '#10B981'
                        }
                    },
                    backgroundImage: {
                        'gradient-primary': 'linear-gradient(135deg, #7C3AED 0%, #2563EB 100%)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Spójne style Glassmorphism */
        body {
            background-color: #0B1220;
            color: #F8FAFC;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .bg-blob {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.4;
            border-radius: 50%;
        }

        /* Stylizacja inputów przy autouzupełnianiu w Chrome */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0F172A inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="antialiased selection:bg-brand-blue selection:text-white relative">

    <!-- Efekty tła -->
    <div class="bg-blob bg-brand-purple w-[500px] h-[500px] top-[-20%] left-[-10%] opacity-30"></div>
    <div class="bg-blob bg-brand-blue w-[600px] h-[600px] bottom-[-20%] right-[-10%] opacity-20"></div>

    <!-- Pasek górny -->
    <div class="absolute top-0 left-0 w-full p-6 z-50 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
            <div class="w-8 h-8 rounded-lg bg-gradient-primary flex items-center justify-center shadow-lg shadow-brand-blue/20">
                <i data-lucide="network" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">CommiShift</span>
        </a>
        <a href="index.html" class="text-sm font-medium text-brand-gray hover:text-white transition-colors flex items-center gap-2">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
        </a>
    </div>

    <!-- Główny kontener logowania -->
    <main class="flex-1 flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 relative z-10">
        
        <div class="w-full max-w-md">
            <!-- Karta logowania -->
            <div class="glass-panel p-8 md:p-10 rounded-2xl relative">
                
                <!-- Nagłówek formularza -->
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">Welcome back</h2>
                    <p class="text-brand-gray text-sm">Sign in to your CommiShift dashboard.</p>
                </div>

                <!-- Przycisk Google -->
                <button class="w-full mb-6 py-3 px-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-colors flex justify-center items-center gap-3 text-sm font-semibold text-white focus:outline-none focus:ring-2 focus:ring-brand-blue/50">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>

                <!-- Separator -->
                <div class="relative mb-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-3 text-brand-gray" style="background-color: #111827; border-radius: 8px;">Or continue with email</span>
                    </div>
                </div>

                <!-- Formularz właściwy -->
                <form id="loginForm" class="space-y-5" onsubmit="event.preventDefault(); handleLogin();">
                    
                    <!-- Pole Email -->
                    <div class="space-y-1.5">
                        <label for="email" class="text-xs font-medium text-brand-gray ml-1">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="w-4 h-4 text-brand-gray"></i>
                            </div>
                            <input id="email" name="email" type="email" required 
                                class="w-full bg-[#0F172A] border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-brand-gray/50 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all" 
                                placeholder="name@company.com">
                        </div>
                    </div>

                    <!-- Pole Hasło -->
                    <div class="space-y-1.5">
                        <div class="flex items-center justify-between ml-1">
                            <label for="password" class="text-xs font-medium text-brand-gray">Password</label>
                            <a href="#" class="text-xs font-medium text-brand-blue hover:text-brand-purple transition-colors">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="w-4 h-4 text-brand-gray"></i>
                            </div>
                            <input id="password" name="password" type="password" required 
                                class="w-full bg-[#0F172A] border border-white/10 rounded-xl pl-11 pr-11 py-3 text-white placeholder-brand-gray/50 focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all" 
                                placeholder="••••••••">
                            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-brand-gray hover:text-white transition-colors">
                                <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Pamiętaj mnie -->
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                            class="h-4 w-4 rounded border-white/10 bg-[#0F172A] text-brand-blue focus:ring-brand-blue focus:ring-offset-0 transition-colors accent-brand-blue cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-brand-gray cursor-pointer">
                            Remember me for 30 days
                        </label>
                    </div>

                    <!-- Przycisk Logowania -->
                    <button type="submit" id="submitBtn" class="w-full mt-2 py-3.5 rounded-xl bg-gradient-primary text-white font-semibold hover:shadow-lg hover:shadow-brand-blue/30 transition-all duration-300 flex justify-center items-center gap-2 transform active:scale-[0.98]">
                        <span id="btnText">Sign In</span>
                        <i data-lucide="arrow-right" id="btnIcon" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
            
            <!-- Link do rejestracji -->
            <p class="text-center mt-8 text-sm text-brand-gray">
                Don't have an account yet? 
                <a href="signup.html" class="font-semibold text-white hover:text-brand-blue transition-colors">Apply as Publisher</a>
            </p>
        </div>
    </main>

    <script>
        // Inicjalizacja ikon Lucide
        lucide.createIcons();

        // Funkcja pokazywania/ukrywania hasła
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // Symulacja logowania
        function handleLogin() {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            
            // Stan ładowania
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.innerText = 'Signing in...';
            btnIcon.setAttribute('data-lucide', 'loader-2');
            btnIcon.classList.add('animate-spin');
            lucide.createIcons();

            setTimeout(() => {
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.innerText = 'Sign In';
                btnIcon.setAttribute('data-lucide', 'arrow-right');
                btnIcon.classList.remove('animate-spin');
                lucide.createIcons();
                
                alert("Demo: Zalogowano pomyślnie. Tutaj nastąpiłoby przekierowanie do panelu użytkownika.");
            }, 1500);
        }
    </script>
</body>
</html>
